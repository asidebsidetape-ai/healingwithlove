<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神聖抽牌 · Sacred Thoth Tarot Oracle</title>
<link href="[https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+TC:wght@300;400&display=swap](https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+TC:wght@300;400&display=swap)" rel="stylesheet">
<style>
  :root {
    color-scheme: light;
    --gold: #8b6914;
    --gold-light: #6b4f0a;
    --gold-dim: #a07c20;
    --bg: #faf6f0;
    --bg2: #f3ece0;
    --ink: #3d2b0e;
    --ink-dim: #7a5c2a;
    --border: rgba(139,105,20,0.22);
    --red: #8b2020;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #faf6f0 !important;
    color: #3d2b0e !important;
    font-family: 'Noto Serif TC', 'Cormorant Garamond', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(139,105,20,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 20% 80%, rgba(139,32,32,0.04) 0%, transparent 50%);
    pointer-events: none;
  }

  /* ── Layout ── */
  .wrapper {
    position: relative; z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* ── Header ── */
  header { text-align: center; margin-bottom: 52px; }

  .header-ornament {
    color: var(--gold);
    font-size: 1.1rem;
    letter-spacing: 0.5em;
    opacity: 0.65;
    margin-bottom: 12px;
  }

  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 300;
    color: var(--gold-light);
    letter-spacing: 0.08em;
    line-height: 1.2;
    margin-bottom: 6px;
  }

  header h2 {
    font-size: clamp(0.8rem, 2vw, 0.95rem);
    font-weight: 300;
    color: var(--ink-dim);
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 18px auto; max-width: 280px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px;
  }
  .divider::before { background: linear-gradient(90deg, transparent, var(--gold-dim)); }
  .divider::after  { background: linear-gradient(90deg, var(--gold-dim), transparent); }
  .divider span { color: var(--gold); font-size: 0.8rem; }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 36px;
  }

  .tab-btn {
    flex: 1;
    background: transparent;
    border: none;
    border-right: 1px solid var(--border);
    color: var(--ink-dim);
    padding: 14px 20px;
    cursor: pointer;
    font-family: 'Noto Serif TC', serif;
    font-size: 0.85rem;
    letter-spacing: 0.12em;
    transition: all 0.3s;
    position: relative;
  }
  .tab-btn:last-child { border-right: none; }
  .tab-btn.active {
    background: rgba(139,105,20,0.1);
    color: var(--gold-light);
  }
  .tab-btn::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
    background: var(--gold);
    transform: scaleX(0);
    transition: transform 0.3s;
  }
  .tab-btn.active::after { transform: scaleX(1); }
  .tab-en {
    display: block;
    font-size: 0.66rem;
    letter-spacing: 0.15em;
    opacity: 0.55;
    margin-top: 2px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
  }

  /* ── Panels ── */
  .panel { display: none; }
  .panel.active { display: block; }

  /* ── Mode toggle ── */
  .mode-toggle {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 24px;
    padding: 13px 18px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: rgba(139,105,20,0.04);
  }
  .mode-toggle label {
    font-size: 0.82rem;
    color: var(--ink-dim);
    letter-spacing: 0.08em;
  }
  .toggle-group { display: flex; gap: 8px; margin-left: auto; }

  .toggle-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ink-dim);
    padding: 6px 18px;
    cursor: pointer;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.9rem;
    border-radius: 2px;
    transition: all 0.25s;
    letter-spacing: 0.08em;
  }
  .toggle-btn.active {
    background: rgba(139,105,20,0.15);
    border-color: var(--gold-dim);
    color: var(--gold-light);
  }

  /* ── Zone grid ── */
  .select-all-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ink-dim);
    padding: 7px 18px;
    cursor: pointer;
    font-family: 'Noto Serif TC', serif;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    border-radius: 2px;
    transition: all 0.25s;
    margin-bottom: 14px;
  }
  .select-all-btn:hover { border-color: var(--gold-dim); color: var(--ink); }

  .zones-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 10px;
    margin-bottom: 28px;
  }

  .zone-card {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    background: rgba(250,246,240,0.85);
    position: relative; overflow: hidden;
  }
  .zone-card::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(139,105,20,0.1), transparent 70%);
    opacity: 0; transition: opacity 0.3s;
  }
  .zone-card:hover::before, .zone-card.selected::before { opacity: 1; }
  .zone-card:hover { border-color: var(--gold-dim); transform: translateY(-2px); }
  .zone-card.selected { border-color: var(--gold); background: rgba(139,105,20,0.08); }

  .zone-icon  { font-size: 1.4rem; margin-bottom: 6px; display: block; }
  .zone-name  { font-size: 0.85rem; color: #3d2b0e; letter-spacing: 0.08em; display: block; }
  .zone-name-en {
    font-size: 0.63rem; color: var(--ink-dim); letter-spacing: 0.1em;
    font-style: italic; font-family: 'Cormorant Garamond', serif;
    display: block; margin-top: 2px;
  }

  /* ── Draw button ── */
  .draw-btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, rgba(139,105,20,0.12), rgba(139,105,20,0.06));
    border: 1px solid var(--gold-dim);
    color: var(--gold-light);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    letter-spacing: 0.2em;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.3s;
    margin-bottom: 36px;
  }
  .draw-btn:hover {
    background: linear-gradient(135deg, rgba(139,105,20,0.22), rgba(139,105,20,0.12));
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(139,105,20,0.1);
    letter-spacing: 0.25em;
  }
  .draw-btn:disabled { opacity: 0.35; cursor: not-allowed; letter-spacing: 0.2em; }
  .btn-en {
    display: block; font-size: 0.68rem; letter-spacing: 0.22em;
    opacity: 0.55; margin-top: 3px; font-style: italic;
  }

  @keyframes fadeIn {
    from { opacity
